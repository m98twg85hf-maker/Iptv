<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Browser</title>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #7c6af5;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --muted: #7070a0;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .logo span { color: var(--muted); font-weight: 400; }

  /* MAIN LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 53px);
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Sidebar toggle button - hidden on desktop */
  .sidebar-toggle {
    display: none;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  /* Sidebar overlay for tablet/mobile */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 199;
  }
  .sidebar-overlay.visible { display: block; }

  /* iPad: sidebar as fixed drawer when toggled open */
  @media (min-width: 701px) and (max-width: 1024px) {
    .layout {
      grid-template-columns: 1fr; /* default: no sidebar column */
    }
    .layout .sidebar {
      position: fixed;
      right: 0;
      top: 53px;
      bottom: 0;
      width: 280px;
      z-index: 200;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      border-left: 1px solid var(--border);
      box-shadow: -4px 0 20px rgba(0,0,0,0.4);
    }
    .layout .sidebar.open {
      transform: translateX(0);
    }
  }

  /* Server Add Form */
  .server-form {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .server-form input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
    margin-bottom: 6px;
    direction: ltr;
  }
  .server-form input:focus { outline: none; border-color: var(--accent); }
  .server-form input::placeholder { color: var(--muted); }
  .btn-add-server {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: opacity 0.2s;
  }
  .btn-add-server:hover { opacity: 0.85; }

  .btn-upload-m3u {
    display: block;
    width: 100%;
    background: var(--surface2);
    border: 1px dashed var(--border);
    color: var(--text);
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-upload-m3u:hover { border-color: var(--accent); color: var(--accent2); }

  /* Server List */
  .server-list { flex: 1; overflow-y: auto; padding: 8px; }
  .server-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .server-item:hover { background: var(--surface2); }
  .server-item.active { background: var(--surface2); border-color: var(--accent); }
  .server-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
  }
  .server-dot.ok { background: var(--green); }
  .server-dot.err { background: var(--red); }
  .server-dot.loading {
    background: var(--yellow);
    animation: pulse 1s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .server-info { flex: 1; overflow: hidden; }
  .server-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .server-meta { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: ltr; }
  .btn-del {
    background: none; border: none; color: var(--muted);
    cursor: pointer; padding: 2px 4px; border-radius: 4px; font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .server-item:hover .btn-del { opacity: 1; }
  .btn-del:hover { color: var(--red); }

  /* MAIN PANEL */
  .main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }

  /* Toolbar */
  .toolbar {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-wrap: nowrap;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .toolbar::-webkit-scrollbar { height: 0; }
  .search-wrap {
    flex: 1;
    min-width: 140px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 36px 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    direction: rtl;
  }
  .search-wrap input:focus { outline: none; border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  .filter-tabs {
    display: flex;
    gap: 5px;
    flex-wrap: nowrap;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .filter-tabs::-webkit-scrollbar { height: 0; }
  .tab-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--accent); }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .stats-bar {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Content area */
  .content { flex: 1; overflow-y: auto; padding: 16px; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
    text-align: center;
  }
  .empty-icon { font-size: 48px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .empty-sub { font-size: 13px; max-width: 300px; line-height: 1.6; }

  /* Loading */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SERIES GRID */
  .series-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .series-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: border-color 0.15s;
  }
  .series-header:hover { border-color: var(--accent); }
  .series-header.open { border-color: var(--accent); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .series-thumb {
    width: 44px; height: 60px;
    background: var(--surface2);
    border-radius: 4px;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 20px;
  }
  .series-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .series-title-wrap { flex: 1; overflow: hidden; }
  .series-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .series-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .chevron { color: var(--muted); transition: transform 0.2s; font-size: 12px; }
  .series-header.open .chevron { transform: rotate(180deg); }

  /* Seasons panel */
  .seasons-panel {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .season-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    padding: 0 8px;
  }
  .season-tab {
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .season-tab:hover { color: var(--text); }
  .season-tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  .season-actions {
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .btn-copy-season {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .btn-copy-season:hover { border-color: var(--accent); color: var(--accent2); }

  /* Episodes */
  .episodes-list { max-height: 320px; overflow-y: auto; }
  .episode-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .episode-row:last-child { border-bottom: none; }
  .episode-row:hover { background: var(--surface2); }
  .ep-num {
    font-size: 12px;
    color: var(--muted);
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }
  .ep-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ep-ext { font-size: 11px; color: var(--muted); direction: ltr; }
  .btn-copy {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent2); }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }

  /* MOVIES GRID */
  .movies-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .movie-card {
    background: var(--surface);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: border-color 0.15s, transform 0.15s;
    cursor: pointer;
  }
  .movie-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .movie-poster {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 32px;
    overflow: hidden;
  }
  .movie-poster img { width: 100%; height: 100%; object-fit: cover; }
  .movie-info { padding: 8px 10px; }
  .movie-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .movie-ext { font-size: 10px; color: var(--muted); margin-top: 2px; direction: ltr; }
  .movie-copy-btn {
    width: 100%;
    margin-top: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 5px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
  }
  .movie-copy-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .movie-copy-btn.copied { border-color: var(--green); color: var(--green); }

  /* CHANNELS */
  .channels-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }
  .channel-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.15s;
  }
  .channel-card:hover { border-color: var(--accent); }
  .channel-logo {
    width: 36px; height: 36px;
    border-radius: 6px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .channel-logo img { width: 100%; height: 100%; object-fit: contain; }
  .channel-name { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .channel-copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .channel-copy-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .channel-copy-btn.copied { border-color: var(--green); color: var(--green); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    z-index: 9999;
    transition: transform 0.3s ease;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .movies-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
  }

  /* ── RESPONSIVE: iPad portrait (768–1024px) ── */
  @media (min-width: 701px) and (max-width: 1024px) {
    .layout {
      grid-template-columns: 260px 1fr;
    }
    .sidebar-toggle {
      display: flex;
    }
    /* On iPad portrait, sidebar can be toggled */
    .sidebar.collapsed {
      display: none;
    }
    .layout.sidebar-hidden {
      grid-template-columns: 1fr;
    }
    .toolbar {
      padding: 8px 12px;
      gap: 6px;
    }
    .search-wrap input {
      font-size: 15px; /* better for touch */
      padding: 9px 36px 9px 12px;
    }
    .tab-btn {
      padding: 7px 10px;
      font-size: 12px;
    }
    .movies-grid {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .channels-list {
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    }
    .episode-row {
      padding: 10px 12px; /* bigger tap targets */
    }
    .btn-copy {
      padding: 6px 14px;
      font-size: 12px;
    }
    .server-form input {
      padding: 9px 10px;
      font-size: 13px;
    }
  }

  /* ── RESPONSIVE: Laptop (1025px+) ── */
  @media (min-width: 1025px) {
    .layout {
      grid-template-columns: 300px 1fr;
    }
    .content { padding: 20px 24px; }
    .toolbar { padding: 12px 24px; gap: 10px; }
    .movies-grid {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }
    /* show delete btn on hover, hide on touch */
    .btn-del { opacity: 0; }
    .server-item:hover .btn-del { opacity: 1; }
  }

  /* ── Touch devices: always show delete button ── */
  @media (hover: none) {
    .btn-del { opacity: 1 !important; }
    .movie-card:hover { transform: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">📺 IPTV <span>Browser</span></div>
  <button class="sidebar-toggle" id="sidebar-toggle-btn" onclick="toggleSidebar()">☰ السيرفرات</button>
  <div style="flex:1"></div>
  <div id="header-meta" style="font-size:12px;color:var(--muted)"></div>
</header>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="layout" id="main-layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">السيرفرات</div>

    <div class="server-form">
      <input type="text" id="inp-name" placeholder="اسم السيرفر (مثال: Server HD)" />
      <input type="text" id="inp-url" placeholder="رابط الـ M3U (اختياري)" />
      <button class="btn-add-server" onclick="addServer()">＋ إضافة برابط URL</button>
      <div style="text-align:center;color:var(--muted);font-size:11px;margin:6px 0;">أو</div>
      <label class="btn-upload-m3u">
        📂 رفع ملف M3U من الجهاز
        <input type="file" id="inp-file" accept=".m3u,.m3u8,.txt" style="display:none" onchange="addServerFromFile(this)" />
      </label>
    </div>

    <div class="server-list" id="server-list">
      <!-- servers rendered here -->
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="🔍  ابحث عن فيلم أو مسلسل..." oninput="onSearch()" />
      </div>
      <div class="filter-tabs" id="filter-tabs">
        <button class="tab-btn active" onclick="setTab('all',this)">الكل</button>
        <button class="tab-btn" onclick="setTab('series',this)">مسلسلات</button>
        <button class="tab-btn" onclick="setTab('movies',this)">أفلام</button>
        <button class="tab-btn" onclick="setTab('live',this)">قنوات</button>
      </div>
      <div class="stats-bar" id="stats-bar"></div>
    </div>
    <div class="content" id="content">
      <div class="empty-state">
        <div class="empty-icon">📡</div>
        <div class="empty-title">لم يتم اختيار سيرفر</div>
        <div class="empty-sub">أضف سيرفر M3U من القائمة الجانبية واضغط عليه لتحميل القوائم</div>
      </div>
    </div>
  </div>
</div>

<div id="toast">✓ تم النسخ!</div>

<script>
// ─── STATE ─────────────────────────────────────────────────────────────────
let servers = JSON.parse(localStorage.getItem('iptv_servers') || '[]');
let activeServer = null;
let allItems = [];         // parsed M3U items
let filteredItems = [];
let currentTab = 'all';
let searchQuery = '';

// grouped
let seriesMap = {};        // name -> { seasons: { S: [eps] }, cover, group }
let movies = [];
let liveChannels = [];

// expanded series state
let openSeries = {};       // name -> bool
let openSeasonTab = {};    // name -> season number

// ─── PERSISTENCE ───────────────────────────────────────────────────────────
function saveServers() {
  localStorage.setItem('iptv_servers', JSON.stringify(servers));
}

// ─── SERVER MANAGEMENT ─────────────────────────────────────────────────────
function addServer() {
  const name = document.getElementById('inp-name').value.trim();
  const url  = document.getElementById('inp-url').value.trim();
  if (!url) return alert('حط الـ URL أولًا');
  const s = { id: Date.now(), name: name || 'Server', url, status: 'idle', count: 0 };
  servers.push(s);
  saveServers();
  renderServers();
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-url').value = '';
}

function addServerFromFile(input) {
  const file = input.files[0];
  if (!file) return;
  const name = document.getElementById('inp-name').value.trim() || file.name.replace(/\.[^.]+$/, '');
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    if (!text.includes('#EXTM3U') && !text.includes('#EXTINF')) {
      alert('الملف ده مش M3U صحيح');
      return;
    }
    // store content directly in server object (no URL needed)
    const s = { id: Date.now(), name, url: '', localContent: text, status: 'idle', count: 0 };
    servers.push(s);
    saveServers();
    renderServers();
    document.getElementById('inp-name').value = '';
    input.value = '';
    // auto-load it
    selectServer(s.id);
  };
  reader.readAsText(file);
}

function deleteServer(id) {
  servers = servers.filter(s => s.id !== id);
  if (activeServer && activeServer.id === id) {
    activeServer = null;
    allItems = [];
    renderContent();
  }
  saveServers();
  renderServers();
}

function renderServers() {
  const list = document.getElementById('server-list');
  if (servers.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px;">لا توجد سيرفرات بعد</div>`;

    <div class="server-item ${activeServer && activeServer.id===s.id ? 'active' : ''}" onclick="selectServer(${s.id})">
      <div class="server-dot ${s.status==='ok'?'ok':s.status==='err'?'err':s.status==='loading'?'loading':''}"></div>
      <div class="server-info">

        <div class="server-meta">${s.status==='ok' ? s.count+' قناة/فيلم' : s.status==='loading'?'جارٍ التحميل...':s.status==='err'?'خطأ في التحميل': s.localContent ? '📂 ملف محلي' : esc(s.url)}</div>
      </div>
      <button class="btn-del" onclick="event.stopPropagation();deleteServer(${s.id})">✕</button>
    </div>
  `).join('');
}

async function selectServer(id) {
  const s = servers.find(x => x.id === id);
  if (!s) return;
  activeServer = s;
  renderServers();
  await loadPlaylist(s);
}

// ─── CORS PROXIES ──────────────────────────────────────────────────────────
const CORS_PROXIES = [
  url => url,                                                                        // 1. direct
  url => `https://proxy.corsfix.com/?${url}`,                                       // 2. corsfix
  url => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}`,     // 3. codetabs
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,           // 4. allorigins
  url => `https://thingproxy.freeboard.io/fetch/${url}`,                            // 5. thingproxy
];

async function fetchWithProxy(url) {
  let lastErr;
  for (let i = 0; i < CORS_PROXIES.length; i++) {
    const proxied = CORS_PROXIES[i](url);
    const label = i === 0 ? 'مباشر' : `Proxy ${i}`;
    showLoadingMsg(`جارٍ التحميل... (${label})`);
    try {
      const resp = await fetch(proxied, { signal: AbortSignal.timeout(12000) });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const text = await resp.text();
      if (!text.includes('#EXTM3U') && !text.includes('#EXTINF')) {
        throw new Error('الملف مش M3U صحيح');
      }
      return text;
    } catch (e) {
      lastErr = e;
      // continue to next proxy
    }
  }
  throw lastErr;
}

// ─── M3U PARSING ───────────────────────────────────────────────────────────
async function loadPlaylist(server) {
  server.status = 'loading';
  renderServers();
  showLoading();

  try {
    let text;
    if (server.localContent) {
      // local file — no network needed
      text = server.localContent;
      showLoadingMsg('جارٍ قراءة الملف المحلي...');
    } else {
      text = await fetchWithProxy(server.url);
    }
    allItems = parseM3U(text);
    server.status = 'ok';
    server.count = allItems.length;
  } catch (e) {
    server.status = 'err';
    allItems = [];
    showError(e.message);
    saveServers();
    renderServers();
    return;
  }
  saveServers();
  renderServers();

  buildIndexes();
  applyFilter();
}

function parseM3U(text) {
  const lines = text.split('\n');
  const items = [];
  let current = null;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#EXTINF')) {
      current = {};
      // extract attributes
      const tvgName  = line.match(/tvg-name="([^"]+)"/);
      const tvgLogo  = line.match(/tvg-logo="([^"]+)"/);
      const group    = line.match(/group-title="([^"]+)"/);
      const epNum    = line.match(/tvg-episode-num="([^"]+)"/);
      const season   = line.match(/tvg-season="([^"]+)"/);
      // title is everything after the last comma
      const titleMatch = line.match(/,(.+)$/);
      current.title  = titleMatch ? titleMatch[1].trim() : 'Untitled';
      current.name   = tvgName   ? tvgName[1]   : current.title;
      current.logo   = tvgLogo   ? tvgLogo[1]   : '';
      current.group  = group     ? group[1]      : '';
      current.epNum  = epNum     ? epNum[1]      : null;
      current.season = season    ? season[1]     : null;
    } else if (line && !line.startsWith('#') && current) {
      current.url = line;
      current.ext = (line.match(/\.(mp4|mkv|avi|ts|m3u8|mov|flv)(\?|$)/i) || [])[1] || '';
      items.push(current);
      current = null;
    }
  }
  return items;
}

// ─── INDEXES ───────────────────────────────────────────────────────────────
function buildIndexes() {
  seriesMap = {};
  movies = [];
  liveChannels = [];

  for (const item of allItems) {
    const g = (item.group || '').toLowerCase();
    const type = detectType(item, g);

    if (type === 'series') {
      const parsed = parseEpisodeTitle(item);
      const key = parsed.seriesName;
      if (!seriesMap[key]) seriesMap[key] = { seasons: {}, cover: item.logo, group: item.group };
      const sNum = parsed.season || '1';
      if (!seriesMap[key].seasons[sNum]) seriesMap[key].seasons[sNum] = [];
      seriesMap[key].seasons[sNum].push({ ...item, _season: sNum, _ep: parsed.ep, _epTitle: parsed.epTitle });
    } else if (type === 'movie') {
      movies.push(item);
    } else {
      liveChannels.push(item);
    }
  }

  // sort episodes within each season
  for (const key of Object.keys(seriesMap)) {
    for (const s of Object.keys(seriesMap[key].seasons)) {
      seriesMap[key].seasons[s].sort((a, b) => {
        const an = parseInt(a._ep) || 0;
        const bn = parseInt(b._ep) || 0;
        return an - bn;
      });
    }
  }
}

function detectType(item, g) {
  // Explicit group hints
  if (/serie|مسلسل|episode|vod.*serie|series/i.test(g)) return 'series';
  if (/movie|فيلم|vod.*movie|cinema/i.test(g)) return 'movie';
  if (/live|channel|قناة|news|sport/i.test(g)) return 'live';

  // Heuristic: episode pattern in name
  const name = item.name || item.title || '';
  if (/[Ss]\d{1,2}[Ee]\d{1,2}/.test(name)) return 'series';
  if (/episode|حلقة|ep\s*\d+/i.test(name)) return 'series';

  // Extension
  if (!item.ext || item.ext === 'ts' || item.ext === 'm3u8') return 'live';
  if (item.ext === 'mp4' || item.ext === 'mkv' || item.ext === 'avi') return 'movie';

  return 'live';
}

function parseEpisodeTitle(item) {
  const raw = item.name || item.title || '';

  // Try S01E02 pattern
  const se = raw.match(/^(.*?)\s*[Ss](\d{1,2})[Ee](\d{1,2})(.*)/);
  if (se) {
    return {
      seriesName: se[1].trim() || raw,
      season: String(parseInt(se[2])),
      ep: String(parseInt(se[3])),
      epTitle: se[4].trim()
    };
  }

  // Try tvg attributes
  if (item.season && item.epNum) {
    return {
      seriesName: item.name || raw,
      season: String(parseInt(item.season)),
      ep: String(parseInt(item.epNum)),
      epTitle: ''
    };
  }

  // Try "Series Name - S1 - E5"
  const se2 = raw.match(/^(.*?)\s*[-–]\s*[Ss](\d+)\s*[-–]\s*[Ee](\d+)/);
  if (se2) {
    return { seriesName: se2[1].trim(), season: se2[2], ep: se2[3], epTitle: '' };
  }

  // Try "Name EP 5"
  const ep = raw.match(/^(.*?)\s+(?:ep|episode|حلقة)\s*(\d+)/i);
  if (ep) {
    return { seriesName: ep[1].trim(), season: '1', ep: ep[2], epTitle: '' };
  }

  // Fallback: use group as series name
  return { seriesName: item.group || raw, season: '1', ep: '0', epTitle: raw };
}

// ─── FILTER & RENDER ───────────────────────────────────────────────────────
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function onSearch() {
  searchQuery = document.getElementById('search-input').value.toLowerCase();
  applyFilter();
}

function applyFilter() {
  const q = searchQuery;

  if (currentTab === 'all' || currentTab === 'series') {
    // Filter series
  }

  renderContent();
}

function getFilteredSeries() {
  return Object.entries(seriesMap)
    .filter(([name]) => !searchQuery || name.toLowerCase().includes(searchQuery))
    .sort((a,b) => a[0].localeCompare(b[0]));
}
function getFilteredMovies() {
  return movies.filter(m => !searchQuery || (m.name||m.title||'').toLowerCase().includes(searchQuery));
}
function getFilteredChannels() {
  return liveChannels.filter(c => !searchQuery || (c.name||c.title||'').toLowerCase().includes(searchQuery));
}

// ─── RENDER ────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('content').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div id="loading-msg">جارٍ تحميل القائمة...</div>
    </div>`;
}
function showLoadingMsg(msg) {
  const el = document.getElementById('loading-msg');
  if (el) el.textContent = msg;
}
function showError(msg) {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      <div class="empty-icon">⚠️</div>
      <div class="empty-title">فشل التحميل</div>
      <div class="empty-sub">${esc(msg)}<br><br>تأكد من الرابط أو جرب CORS proxy</div>
    </div>`;
}

function renderContent() {
  if (!activeServer || allItems.length === 0) return;

  const filtSeries   = getFilteredSeries();
  const filtMovies   = getFilteredMovies();
  const filtChannels = getFilteredChannels();

  let html = '';
  let total = 0;

  if (currentTab === 'all' || currentTab === 'series') {
    if (filtSeries.length) {
      total += filtSeries.length;
      if (currentTab === 'all') html += `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">مسلسلات (${filtSeries.length})</div>`;
      html += `<div class="series-list" id="series-list">`;
      for (const [name, data] of filtSeries) {
        html += renderSeriesRow(name, data);
      }
      html += `</div>`;
      if (currentTab === 'all' && (filtMovies.length || filtChannels.length)) html += `<div style="margin:20px 0;border-top:1px solid var(--border)"></div>`;
    }
  }

  if (currentTab === 'all' || currentTab === 'movies') {
    if (filtMovies.length) {
      total += filtMovies.length;
      if (currentTab === 'all') html += `<div style="font-size:12px;color:var(--muted);margin:0 0 8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">أفلام (${filtMovies.length})</div>`;
      html += `<div class="movies-grid">`;
      for (const m of filtMovies) html += renderMovieCard(m);
      html += `</div>`;
      if (currentTab === 'all' && filtChannels.length) html += `<div style="margin:20px 0;border-top:1px solid var(--border)"></div>`;
    }
  }

  if (currentTab === 'all' || currentTab === 'live') {
    if (filtChannels.length) {
      total += filtChannels.length;
      if (currentTab === 'all') html += `<div style="font-size:12px;color:var(--muted);margin:0 0 8px;font-weight:600;text-transform:uppercase;letter-spacing:1px;">قنوات (${filtChannels.length})</div>`;
      html += `<div class="channels-list">`;
      for (const c of filtChannels) html += renderChannelCard(c);
      html += `</div>`;
    }
  }

  if (!html) {
    html = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">لا توجد نتائج</div><div class="empty-sub">جرب بحثًا مختلفًا</div></div>`;
  }

  document.getElementById('content').innerHTML = html;
  document.getElementById('stats-bar').textContent = total ? `${total.toLocaleString()} نتيجة` : '';
  document.getElementById('header-meta').textContent = allItems.length ? `${allItems.length.toLocaleString()} عنصر` : '';
}

function renderSeriesRow(name, data) {
  const isOpen = !!openSeries[name];
  const seasons = Object.keys(data.seasons).sort((a,b) => parseInt(a)-parseInt(b));
  const activeSeason = openSeasonTab[name] || seasons[0] || '1';
  const eps = data.seasons[activeSeason] || [];
  const totalEps = Object.values(data.seasons).reduce((s,a) => s+a.length, 0);

  let html = `
    <div>
      <div class="series-header ${isOpen?'open':''}" onclick="toggleSeries('${escQ(name)}')">
        <div class="series-thumb">
          ${data.cover ? `<img src="${esc(data.cover)}" onerror="this.style.display='none'" />` : '🎬'}
        </div>
        <div class="series-title-wrap">
          <div class="series-title">${esc(name)}</div>
          <div class="series-meta">${seasons.length} موسم · ${totalEps} حلقة</div>
        </div>
        <span class="chevron">▼</span>
      </div>`;

  if (isOpen) {
    html += `<div class="seasons-panel">`;
    // Season tabs
    html += `<div class="season-tabs">`;
    for (const s of seasons) {
      html += `<div class="season-tab ${s===activeSeason?'active':''}" onclick="setSeason('${escQ(name)}','${s}')">موسم ${s}</div>`;
    }
    html += `</div>`;
    // Action: copy all season links
    html += `<div class="season-actions">
      <span style="font-size:12px;color:var(--muted)">موسم ${activeSeason} · ${eps.length} حلقة</span>
      <button class="btn-copy-season" onclick="copySeasonLinks('${escQ(name)}','${activeSeason}')">📋 نسخ لينكات الموسم كله</button>
      <button class="btn-copy-season" onclick="copySeasonM3U('${escQ(name)}','${activeSeason}')">📄 تصدير M3U الموسم</button>
    </div>`;
    // Episodes
    html += `<div class="episodes-list">`;
    for (const ep of eps) {
      const label = ep._ep !== '0' ? `ح ${ep._ep}` : ep._epTitle || ep.title || ep.name;
      const extBadge = ep.ext ? `<span class="ep-ext">.${ep.ext}</span>` : '';
      html += `
        <div class="episode-row">
          <div class="ep-num">${ep._ep !== '0' ? ep._ep : '—'}</div>
          <div class="ep-name" title="${esc(ep.title||ep.name)}">${esc(ep._epTitle || ep.title || ep.name)}</div>
          ${extBadge}
          <button class="btn-copy" onclick="copyLink('${escQ(ep.url)}', this)">نسخ</button>
        </div>`;
    }
    html += `</div></div>`;
  }

  html += `</div>`;
  return html;
}

function renderMovieCard(m) {
  const title = m.name || m.title || 'فيلم';
  return `
    <div class="movie-card">
      <div class="movie-poster">
        ${m.logo ? `<img src="${esc(m.logo)}" onerror="this.style.display='none'" />` : '🎬'}
      </div>
      <div class="movie-info">
        <div class="movie-title" title="${esc(title)}">${esc(title)}</div>
        ${m.ext ? `<div class="movie-ext">.${m.ext}</div>` : ''}
        <button class="movie-copy-btn" onclick="copyLink('${escQ(m.url)}', this)">📋 نسخ الرابط</button>
      </div>
    </div>`;
}

function renderChannelCard(c) {
  const name = c.name || c.title || 'قناة';
  return `
    <div class="channel-card">
      <div class="channel-logo">
        ${c.logo ? `<img src="${esc(c.logo)}" onerror="this.style.display='none'" />` : '📺'}
      </div>
      <div class="channel-name" title="${esc(name)}">${esc(name)}</div>
      <button class="channel-copy-btn" onclick="copyLink('${escQ(c.url)}', this)">نسخ</button>
    </div>`;
}

// ─── INTERACTIONS ──────────────────────────────────────────────────────────
function toggleSeries(name) {
  openSeries[name] = !openSeries[name];
  renderContent();
  // scroll to keep in view
}

function setSeason(name, season) {
  openSeasonTab[name] = season;
  renderContent();
}

function copyLink(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ تم';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
    }
    showToast('✓ تم نسخ الرابط!');
  });
}

function copySeasonLinks(seriesName, season) {
  const eps = (seriesMap[seriesName]?.seasons[season]) || [];
  const links = eps.map(e => e.url).join('\n');
  navigator.clipboard.writeText(links).then(() => {
    showToast(`✓ تم نسخ ${eps.length} رابط للموسم ${season}`);
  });
}

function copySeasonM3U(seriesName, season) {
  const eps = (seriesMap[seriesName]?.seasons[season]) || [];
  let m3u = '#EXTM3U\n';
  for (const ep of eps) {
    m3u += `#EXTINF:-1 tvg-name="${ep.name}" tvg-logo="${ep.logo||''}" group-title="${ep.group||''}",${ep.title||ep.name}\n${ep.url}\n`;
  }
  navigator.clipboard.writeText(m3u).then(() => {
    showToast(`✓ تم نسخ M3U (${eps.length} حلقة)`);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── UTILS ─────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escQ(s) {
  return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

let sidebarOpen = false;

function toggleSidebar() {
  const sidebar  = document.querySelector('.sidebar');
  const overlay  = document.getElementById('sidebar-overlay');
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('open', sidebarOpen);
  overlay.classList.toggle('visible', sidebarOpen);

// Show toggle button only on iPad-range widths
function updateToggleVisibility() {
  const btn = document.getElementById('sidebar-toggle-btn');
  if (window.innerWidth >= 701 && window.innerWidth <= 1024) {
    btn.style.display = 'flex';
  } else {
    btn.style.display = 'none';
    // also close drawer if resizing to desktop
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
    sidebarOpen = false;
  }
}
window.addEventListener('resize', updateToggleVisibility);
updateToggleVisibility();

renderServers();
